<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDo List</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

  </head>

  <body class="bg-light">
    <div class="container py-4">
      <h1 class="text-center mb-4">Lab2 - ToDo List</h1>
      <div class="card p-3 mb-4 shadow-sm">
        <div class="input-group">
          <input
            type="text"
            id="listInput"
            class="form-control"
            placeholder="Dodaj nową listę"
          />
          <button id="addListBtn" class="btn btn-primary" onclick="addList()">
            Dodaj listę
          </button>
        </div>
      </div>

      <div class="row">
        <div class="col-md-8">
          <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">Listy zadań</div>

            <div class="card-body" id="listContainer">
              <div class="mb-3">
                <input
                  type="text"
                  id="searchInput"
                  class="form-control mb-2"
                  placeholder="Szukaj w zadaniach..."
                  oninput="searchTasks()"
                />

                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="caseCheck"
                    checked
                    onchange="searchTasks()"
                  />

                  <label class="form-check-label"> Case-insensitive </label>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">Kosz</div>

            <div class="card-body" id="Trashbin">
              <p class="text-muted">Brak usuniętych zadań</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
